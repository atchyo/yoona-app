<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opti-Me | AI 복용비서</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --deep-emerald: #002D24;
      --gold: #D4AF37;
      --platinum: #F7F7F4;
    }
    body {
      background: radial-gradient(circle at top right, #0b4d3f 0%, #001712 45%, #000f0c 100%);
      color: #f8f8f6;
      min-height: 100vh;
    }
    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    .fade {
      animation: fadeIn .4s ease;
    }
    @keyframes fadeIn { from {opacity: 0; transform: translateY(5px);} to {opacity: 1; transform: translateY(0);} }
    .danger { color: #ff7676; }
    .safe { color: #7bf2be; }
    @media print {
      body > *:not(#reportPrint) { display: none !important; }
      #reportPrint { display: block !important; color: black; }
    }
  </style>
</head>
<body class="p-4 md:p-8">
  <div class="max-w-6xl mx-auto space-y-6">
    <header class="glass rounded-2xl p-6">
      <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-[#D4AF37]">옵티미 (Opti-Me)</h1>
      <p class="text-sm md:text-base text-slate-200 mt-2">연령 맞춤형 AI 복용비서 · 약물/영양제 상호작용 안전 가이드</p>
    </header>

    <section class="grid md:grid-cols-3 gap-4">
      <div class="glass rounded-2xl p-4">
        <label class="text-sm text-slate-300">연령대 선택</label>
        <select id="ageGroup" class="w-full mt-2 rounded-xl bg-black/30 p-2 border border-white/20">
          <option value="20">20~39세</option>
          <option value="40">40~59세</option>
          <option value="60" selected>60세 이상</option>
        </select>
      </div>
      <div class="glass rounded-2xl p-4">
        <label class="text-sm text-slate-300">AI 비서 말투</label>
        <select id="assistantTone" class="w-full mt-2 rounded-xl bg-black/30 p-2 border border-white/20">
          <option value="pro">전문 수석 비서</option>
          <option value="warm">다정한 친구</option>
        </select>
      </div>
      <div class="glass rounded-2xl p-4">
        <label class="text-sm text-slate-300">프로필 선택</label>
        <div class="mt-2 flex gap-2 flex-wrap" id="profiles"></div>
      </div>
    </section>

    <section class="grid lg:grid-cols-2 gap-4">
      <div class="glass rounded-2xl p-5 space-y-4 fade">
        <h2 class="text-xl font-semibold text-[#D4AF37]">A. AI 매직 스캔 & 정밀 분석</h2>
        <input id="photo" type="file" accept="image/*" class="w-full text-sm" />
        <textarea id="ingredientInput" rows="4" class="w-full rounded-xl bg-black/30 p-3 border border-white/20"
          placeholder="예시: 비타민C 1000mg, 칼슘 500mg, 철분 18mg"></textarea>
        <button id="analyzeBtn" class="w-full bg-[#D4AF37] text-[#002D24] font-semibold py-2 rounded-xl">성분 분석하기</button>
        <div id="analysis" class="text-sm text-slate-100 space-y-2"></div>
      </div>

      <div class="glass rounded-2xl p-5 space-y-4 fade">
        <h2 class="text-xl font-semibold text-[#D4AF37]">C. 지능형 타임라인 & AI 채팅</h2>
        <div id="timeline" class="text-sm bg-black/20 rounded-xl p-3">분석 후 최적 복용 스케줄이 표시됩니다.</div>
        <div class="bg-black/20 rounded-xl p-3 h-64 overflow-y-auto space-y-2" id="chatLog"></div>
        <div class="flex gap-2">
          <input id="chatInput" type="text" class="flex-1 rounded-xl bg-black/30 p-2 border border-white/20" placeholder="예: 감기약이랑 같이 먹어도 돼?" />
          <button id="sendChat" class="bg-[#D4AF37] text-[#002D24] px-4 rounded-xl font-semibold">전송</button>
        </div>
      </div>
    </section>

    <section class="grid lg:grid-cols-2 gap-4">
      <div class="glass rounded-2xl p-5 space-y-3">
        <h2 class="text-xl font-semibold text-[#D4AF37]">B. 옵티-패밀리 & 펫 허브</h2>
        <ul id="familyStatus" class="text-sm space-y-2"></ul>
      </div>

      <div class="glass rounded-2xl p-5 space-y-3">
        <h2 class="text-xl font-semibold text-[#D4AF37]">D. 전문가용 의료 리포트</h2>
        <button id="buildReport" class="w-full bg-white/90 text-[#002D24] py-2 rounded-xl font-semibold">리포트 생성</button>
        <button onclick="window.print()" class="w-full bg-[#D4AF37] text-[#002D24] py-2 rounded-xl font-semibold">인쇄 / PDF 저장</button>
        <div id="reportPreview" class="text-sm bg-black/20 rounded-xl p-3">리포트 미생성</div>
      </div>
    </section>

    <section id="reportPrint" class="hidden bg-white p-6 rounded text-black">
      <h2 class="text-2xl font-bold">응급 의료 리포트 (Opti-Me)</h2>
      <div id="reportPrintContent" class="mt-4 text-sm"></div>
    </section>
  </div>

  <script>
    const state = {
      currentProfile: '나',
      profiles: [
        {name:'나', type:'self', meds:['비타민C','칼슘']},
        {name:'어머니', type:'parent', meds:['고혈압약','오메가3']},
        {name:'흰둥이', type:'pet', meds:['관절 영양제']},
      ],
      ingredients: []
    };

    const interactionRules = [
      {pair:['칼슘','철분'], level:'주의', msg:'칼슘과 철분은 흡수 경쟁이 있어 시간 간격(2시간 이상) 권장'},
      {pair:['오메가3','항응고제'], level:'위험', msg:'출혈 위험 증가 가능성. 의료진 상담 필요'},
      {pair:['비타민A','간기능'], level:'주의', msg:'간질환 이력이 있으면 과다 복용 주의 필요'},
      {pair:['감기약','카페인'], level:'주의', msg:'일부 감기약과 카페인 병용 시 심박 증가 가능'}
    ];

    const profilesEl = document.getElementById('profiles');
    function renderProfiles() {
      profilesEl.innerHTML = '';
      state.profiles.forEach(p => {
        const btn = document.createElement('button');
        btn.textContent = p.name;
        btn.className = `px-3 py-1 rounded-full text-sm border ${state.currentProfile===p.name ? 'bg-[#D4AF37] text-[#002D24] border-[#D4AF37]' : 'bg-black/20 border-white/20'}`;
        btn.onclick = () => { state.currentProfile = p.name; renderProfiles(); renderFamilyStatus(); };
        profilesEl.appendChild(btn);
      });
    }

    function renderFamilyStatus() {
      const ul = document.getElementById('familyStatus');
      ul.innerHTML = '';
      state.profiles.forEach(p => {
        const li = document.createElement('li');
        li.className = 'p-2 rounded bg-black/20';
        li.innerHTML = `<strong>${p.name}</strong> · ${p.type==='pet'?'반려견':'가족'} · 복용: ${p.meds.join(', ')} <span class='text-[#D4AF37] float-right'>${p.name===state.currentProfile?'확인중':'정상'}</span>`;
        ul.appendChild(li);
      });
    }

    function analyzeIngredients() {
      const raw = document.getElementById('ingredientInput').value;
      state.ingredients = raw.split(',').map(v=>v.trim()).filter(Boolean);
      const analysis = document.getElementById('analysis');
      if (!state.ingredients.length) {
        analysis.innerHTML = '<p class="danger">성분을 입력해주세요.</p>';
        return;
      }
      const findings = [];
      interactionRules.forEach(rule => {
        const hasAll = rule.pair.every(k => state.ingredients.some(i => i.includes(k)));
        if (hasAll) findings.push(rule);
      });

      const age = Number(document.getElementById('ageGroup').value);
      let gauge = '적정';
      if (findings.some(f=>f.level==='위험')) gauge = '고위험';
      else if (findings.length || age >= 60) gauge = '주의';

      analysis.innerHTML = `
        <p>분석 성분: <strong>${state.ingredients.join(', ')}</strong></p>
        <p>복용 안전도: <strong class="${gauge==='고위험'?'danger':gauge==='주의'?'text-yellow-300':'safe'}">${gauge}</strong></p>
        <ul class="list-disc pl-5">${findings.length ? findings.map(f=>`<li><b>[${f.level}]</b> ${f.msg}</li>`).join('') : '<li>중대한 충돌은 탐지되지 않았습니다.</li>'}</ul>
      `;

      const timeline = document.getElementById('timeline');
      timeline.innerHTML = `
        <div><b>오전 공복</b>: 철분 계열(해당 시)</div>
        <div><b>식후</b>: 멀티비타민·오메가3</div>
        <div><b>취침 전</b>: 마그네슘/칼슘 (철분과 2시간 이상 간격)</div>
      `;
    }

    function assistantReply(msg) {
      const tone = document.getElementById('assistantTone').value;
      const age = Number(document.getElementById('ageGroup').value);
      let prefix = tone==='pro' ? '전문 비서: ' : '친구: ';
      let answer = '복용 중인 성분 리스트를 먼저 분석해볼게요.';

      if (msg.includes('감기약')) {
        answer = '감기약 복용 시 카페인·중복 진통성분 여부를 먼저 확인하세요. 현재 성분과 함께 복용 가능 여부를 주의 단계로 안내드릴게요.';
      } else if (msg.includes('타이레놀') || msg.includes('아세트아미노펜')) {
        answer = '타이레놀(아세트아미노펜)은 동일 성분 중복 섭취를 피해야 합니다. 감기약 성분표에 아세트아미노펜이 있는지 확인하세요.';
      } else if (msg.includes('같이 먹어') || msg.includes('병용')) {
        answer = '병용 가능성은 성분 조합에 따라 달라집니다. 분석 결과의 위험/주의 항목을 우선 확인해주세요.';
      }

      if (age >= 60) answer += ' 60세 이상은 복용 간격과 용량 보수적으로 관리하는 것을 권장합니다.';
      answer += ' (본 서비스는 의료행위 대체가 아닌 정보 제공용입니다.)';
      return prefix + answer;
    }

    function addChat(role, text) {
      const log = document.getElementById('chatLog');
      const bubble = document.createElement('div');
      bubble.className = `rounded-xl p-2 text-sm ${role==='user'?'bg-[#D4AF37] text-[#002D24] ml-8':'bg-black/30 mr-8'}`;
      bubble.textContent = text;
      log.appendChild(bubble);
      log.scrollTop = log.scrollHeight;
    }

    function generateReport() {
      const profile = state.currentProfile;
      const ing = state.ingredients.length ? state.ingredients.join(', ') : '미입력';
      const warning = document.getElementById('analysis').innerText || '분석 미실행';
      const content = `
        <p><b>환자/대상:</b> ${profile}</p>
        <p><b>기저질환:</b> 고혈압(예시)</p>
        <p><b>현재 복용 성분:</b> ${ing}</p>
        <p><b>주의 성분:</b> <span style="color:red">칼슘-철분 동시복용 주의, 감기약 중복 성분 확인</span></p>
        <p><b>AI 종합 의견:</b> ${warning.replaceAll('\n',' / ')}</p>
        <p><b>QR 코드:</b> [응급 정보 링크]</p>
      `;
      document.getElementById('reportPreview').innerHTML = content;
      document.getElementById('reportPrintContent').innerHTML = content;
      document.getElementById('reportPrint').classList.remove('hidden');
    }

    document.getElementById('analyzeBtn').onclick = analyzeIngredients;
    document.getElementById('sendChat').onclick = () => {
      const input = document.getElementById('chatInput');
      const msg = input.value.trim();
      if (!msg) return;
      addChat('user', msg);
      addChat('ai', assistantReply(msg));
      input.value = '';
    };
    document.getElementById('buildReport').onclick = generateReport;

    addChat('ai', '안녕하세요. 연령을 선택하고 성분을 입력하면 복용 안전도를 분석해드릴게요.');
    renderProfiles();
    renderFamilyStatus();
  </script>
</body>
</html>
